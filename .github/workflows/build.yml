name: Build QuickMenus (multi-version)
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - paper-1.20.4
          - paper-1.21.4
          - paper-1.21.5
          - paper-1.21.6
          - paper-1.21.7
          - paper-1.21.8
          - paper-26.1.1
          - paper-26.1.2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - name: Build (${{ matrix.profile }})
        run: mvn -B -P ${{ matrix.profile }} clean package
      - uses: actions/upload-artifact@v4
        with:
          name: QuickMenus-${{ matrix.profile }}
          path: target/QuickMenus-*.jar
